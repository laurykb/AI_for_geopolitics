<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 640" width="512" height="640">
  <!-- Laury — mascotte originale du jeu, v3 : le visage v2 (casquette, boucles) dans la
       grammaire Petit Kairos (nuit/or/cyan, écharpe, le petit monde offert). Source maître. -->
  <defs>
    <radialGradient id="irisBrown" cx="0.4" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#9a5a2e"/>
      <stop offset="0.55" stop-color="#6b3a1c"/>
      <stop offset="1" stop-color="#331a0c"/>
    </radialGradient>
    <radialGradient id="globeGrad" cx="0.38" cy="0.3" r="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.6" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#175f96"/>
    </radialGradient>
    <radialGradient id="globeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.55" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="capGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2342"/>
      <stop offset="1" stop-color="#10162e"/>
    </linearGradient>
    <linearGradient id="teeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#e9e7de"/>
    </linearGradient>
    <linearGradient id="pantsNight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26305a"/>
      <stop offset="1" stop-color="#181f38"/>
    </linearGradient>
    <filter id="sticker" x="-12%" y="-12%" width="124%" height="124%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="6" result="d"/>
      <feFlood flood-color="#ffffff" result="f"/>
      <feComposite in="f" in2="d" operator="in" result="outline"/>
      <feMerge><feMergeNode in="outline"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ombre au sol (hors contour autocollant) -->
  <ellipse cx="258" cy="634" rx="126" ry="11" fill="#000000" opacity="0.30"/>

  <g filter="url(#sticker)" font-family="Arial, Helvetica, sans-serif">

    <!-- ===== torse : t-shirt blanc oversize ===== -->
    <path d="M 176 366 Q 216 348 258 348 Q 300 348 340 366 Q 356 372 358 392 Q 364 418 356 428
             L 324 420 Q 328 452 322 482 Q 258 498 194 482 Q 188 452 192 420 L 160 428
             Q 152 418 158 392 Q 160 372 176 366 Z" fill="url(#teeGrad)"/>
    <path d="M 158 414 Q 168 428 186 432 L 182 442 Q 162 436 154 422 Z" fill="#d9d6cb"/>
    <path d="M 358 414 Q 348 428 330 432 L 334 442 Q 354 436 362 422 Z" fill="#d9d6cb"/>
    <path d="M 214 436 Q 222 452 218 470" stroke="#dcd8cd" stroke-width="4" fill="none" stroke-linecap="round"/>
