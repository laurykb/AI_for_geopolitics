    <path d="M 194 478 Q 258 492 322 478" stroke="#d5d1c5" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
    <text x="258" y="440" font-size="16" font-weight="700" fill="#17181c" text-anchor="middle" letter-spacing="0.5">loryski</text>

    <!-- ===== bras droit du personnage (viewer droite) : poing sur la hanche ===== -->
    <path d="M 324 394 Q 354 404 360 440 Q 364 464 346 478 L 322 462 Q 332 428 318 408 Z" fill="#a7693d"/>
    <path d="M 316 382 Q 340 388 350 406 L 328 418 Q 320 400 306 394 Z" fill="#f6f5f0"/>
    <circle cx="338" cy="472" r="16" fill="#a7693d"/>
    <path d="M 328 464 Q 338 460 348 465" stroke="#7c4527" stroke-width="3" fill="none" stroke-linecap="round"/>

