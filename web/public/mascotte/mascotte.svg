             Q 254 556 252 588 L 176 584 Q 172 540 184 486 Q 186 470 198 470 Z" fill="url(#pantsNight)"/>
    <path d="M 198 477 L 318 477" stroke="#141b32" stroke-width="4"/>
    <path d="M 208 500 Q 204 536 208 568" stroke="#141b32" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 300 502 Q 306 538 302 568" stroke="#141b32" stroke-width="4" fill="none" stroke-linecap="round"/>

