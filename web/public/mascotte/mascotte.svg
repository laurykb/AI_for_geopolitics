    <path d="M 164 580 Q 158 600 162 612 L 258 612 Q 258 598 250 586 Q 234 572 206 572 Q 180 572 164 580 Z" fill="#1a2138"/>
    <path d="M 192 582 Q 208 589 226 582" stroke="#10162e" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 160 612 Q 154 628 176 630 L 246 630 Q 262 628 258 612 Z" fill="#ca8a04"/>
    <path d="M 268 586 Q 262 598 262 612 L 356 612 Q 360 600 354 580 Q 338 572 312 572 Q 284 572 268 586 Z" fill="#1a2138"/>
    <path d="M 294 582 Q 310 589 328 582" stroke="#10162e" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 262 612 Q 258 628 278 630 L 348 630 Q 370 628 362 612 Z" fill="#ca8a04"/>

