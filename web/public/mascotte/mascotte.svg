    <path d="M 104 388 Q 116 378 130 384 Q 142 390 138 400 Q 128 406 116 402 Q 104 398 104 388 Z" fill="#eab308" opacity="0.9"/>
    <path d="M 134 418 Q 148 412 158 420 Q 156 432 142 434 Q 132 430 134 418 Z" fill="#eab308" opacity="0.9"/>
    <path d="M 112 424 Q 120 420 124 426 Q 120 434 112 432 Z" fill="#eab308" opacity="0.75"/>
    <circle cx="128" cy="404" r="40" fill="none" stroke="#bfe7ff" stroke-width="2.5" opacity="0.65"/>
    <ellipse cx="118" cy="390" rx="14" ry="8" fill="#ffffff" opacity="0.35"/>
    <ellipse cx="140" cy="436" rx="11" ry="9" fill="#8f5530"/>

    <!-- étincelle d'or (accent du thème) -->
    <path d="M 380 300 L 385 313 L 398 318 L 385 323 L 380 336 L 375 323 L 362 318 L 375 313 Z" fill="#eab308"/>
