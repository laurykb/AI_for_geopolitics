    <path d="M 150 172 Q 146 62 258 56 Q 370 62 366 172 Q 258 196 150 172 Z" fill="url(#capGrad)"/>
    <path d="M 222 62 Q 216 118 218 184" stroke="#0b1022" stroke-width="3" fill="none" opacity="0.8"/>
