<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 640" width="512" height="640">
  <!-- Laury — mascotte originale du jeu, v2 « street » (casquette, marqueur, sneakers). Source maître. -->
  <defs>
    <radialGradient id="irisBrown" cx="0.4" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#9a5a2e"/>
      <stop offset="0.55" stop-color="#6b3a1c"/>
      <stop offset="1" stop-color="#331a0c"/>
    </radialGradient>
    <linearGradient id="capGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#24262c"/>
      <stop offset="1" stop-color="#141519"/>
    </linearGradient>
    <linearGradient id="teeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#e9e7de"/>
    </linearGradient>
    <linearGradient id="pantsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1c22"/>
      <stop offset="1" stop-color="#101116"/>
    </linearGradient>
    <clipPath id="patchClip"><rect x="204" y="504" width="50" height="66" rx="6"/></clipPath>
    <filter id="sticker" x="-12%" y="-12%" width="124%" height="124%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="6" result="d"/>
      <feFlood flood-color="#ffffff" result="f"/>
      <feComposite in="f" in2="d" operator="in" result="outline"/>
      <feMerge><feMergeNode in="outline"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

