    <path d="M 196 350 Q 258 330 320 350 Q 327 368 318 381 Q 258 360 198 381 Q 189 368 196 350 Z" fill="#38bdf8"/>
    <path d="M 198 381 Q 258 360 318 381 L 314 392 Q 258 372 202 392 Z" fill="#2494d1"/>
    <path d="M 304 374 Q 342 390 352 426 Q 356 442 344 452 Q 340 434 326 420 Q 310 406 296 388 Z" fill="#2494d1"/>

