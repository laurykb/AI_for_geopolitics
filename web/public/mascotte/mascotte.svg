    <path d="M 184 238 Q 210 228 236 235" stroke="#17100a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 280 235 Q 306 228 332 238" stroke="#17100a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <ellipse cx="212" cy="272" rx="27" ry="31" fill="#ffffff"/>
    <ellipse cx="304" cy="272" rx="27" ry="31" fill="#ffffff"/>
    <circle cx="214" cy="275" r="19" fill="url(#irisBrown)"/>
