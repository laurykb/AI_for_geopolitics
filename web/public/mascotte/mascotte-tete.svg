<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Laury — tête-logo v2 (médaillon orbital conservé, nouveau visage casquette + marqueur). Source maître. -->
  <defs>
    <radialGradient id="irisBrownT" cx="0.4" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#9a5a2e"/>
      <stop offset="0.55" stop-color="#6b3a1c"/>
      <stop offset="1" stop-color="#331a0c"/>
    </radialGradient>
    <linearGradient id="capGradT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#24262c"/>
      <stop offset="1" stop-color="#141519"/>
    </linearGradient>
    <radialGradient id="globeGradT" cx="0.38" cy="0.3" r="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.6" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#175f96"/>
    </radialGradient>
    <radialGradient id="globeGlowT" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.55" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="stickerT" x="-15%" y="-15%" width="130%" height="130%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="4" result="d"/>
      <feFlood flood-color="#ffffff" result="f"/>
      <feComposite in="f" in2="d" operator="in" result="outline"/>
      <feMerge><feMergeNode in="outline"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- médaillon -->
  <circle cx="128" cy="128" r="122" fill="#0d1226"/>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#ca8a04" stroke-width="4"/>

  <!-- orbite (moitié arrière, derrière la tête) -->
  <g transform="rotate(-16 128 152)">
    <path d="M 20 152 A 108 40 0 0 1 236 152" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.45"/>
  </g>

  <g filter="url(#stickerT)" font-family="Arial, Helvetica, sans-serif">
    <!-- col du t-shirt -->
    <path d="M 102 206 Q 128 220 154 206 L 152 228 Q 128 240 104 228 Z" fill="#f4f2ea"/>

    <!-- ===== tête (mêmes formes que la mascotte pied, recentrées) ===== -->
    <g transform="translate(-27 -14) scale(0.60)">
      <!-- oreilles -->
      <ellipse cx="154" cy="254" rx="13" ry="18" fill="#a7693d"/>
      <ellipse cx="362" cy="254" rx="13" ry="18" fill="#a7693d"/>
      <ellipse cx="156" cy="254" rx="6" ry="9" fill="#8f5530"/>
      <ellipse cx="360" cy="254" rx="6" ry="9" fill="#8f5530"/>
      <!-- visage -->
      <path d="M 158 240 Q 158 150 258 150 Q 358 150 358 240 Q 358 300 322 328 Q 290 350 258 350
               Q 226 350 194 328 Q 158 300 158 240 Z" fill="#a7693d"/>
      <!-- cheveux : favoris bouclés sous la casquette -->
      <g fill="#170f08">
        <path d="M 158 202 L 158 248 Q 164 257 173 250 Q 168 232 170 216 Q 166 204 158 202 Z"/>
        <circle cx="173" cy="222" r="5.5"/><circle cx="171" cy="238" r="5"/>
        <path d="M 358 202 L 358 248 Q 352 257 343 250 Q 348 232 346 216 Q 350 204 358 202 Z"/>
        <circle cx="343" cy="222" r="5.5"/><circle cx="345" cy="238" r="5"/>
      </g>
      <!-- ombre de la visière -->
      <path d="M 170 226 Q 250 248 336 224 L 336 242 Q 250 264 170 244 Z" fill="#7c4527" opacity="0.45"/>
      <!-- casquette : visière de baseball (balayée côté gauche), couronne PAR-DESSUS -->
      <path d="M 108 186 Q 86 202 104 218 Q 150 236 230 234 Q 302 232 344 214 Q 358 204 346 188
               Q 300 206 240 206 Q 166 206 108 186 Z" fill="#0e0f13"/>
      <path d="M 120 200 Q 230 228 338 200" stroke="#2a2c33" stroke-width="3" fill="none" opacity="0.8"/>
      <path d="M 146 192 Q 142 64 258 56 Q 374 64 370 192 Q 258 216 146 192 Z" fill="url(#capGradT)"/>
      <path d="M 222 62 Q 216 120 219 204" stroke="#0c0d10" stroke-width="3" fill="none" opacity="0.8"/>
      <path d="M 294 62 Q 300 120 297 204" stroke="#0c0d10" stroke-width="3" fill="none" opacity="0.8"/>
      <path d="M 172 116 Q 186 70 242 60 Q 202 80 188 122 Z" fill="#2c2e36" opacity="0.7"/>
      <circle cx="258" cy="56" r="7" fill="#0b0c0e"/>
      <text x="258" y="148" font-size="34" font-weight="700" fill="#f5f5f2" text-anchor="middle" letter-spacing="1">loryski</text>
      <!-- traits -->
      <path d="M 184 236 Q 210 226 236 233" stroke="#17100a" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M 280 233 Q 306 226 332 236" stroke="#17100a" stroke-width="8" fill="none" stroke-linecap="round"/>
      <ellipse cx="212" cy="270" rx="27" ry="31" fill="#ffffff"/>
      <ellipse cx="304" cy="270" rx="27" ry="31" fill="#ffffff"/>
      <circle cx="214" cy="273" r="19" fill="url(#irisBrownT)"/>
      <circle cx="302" cy="273" r="19" fill="url(#irisBrownT)"/>
      <circle cx="214" cy="273" r="19" fill="none" stroke="#24120a" stroke-width="2"/>
      <circle cx="302" cy="273" r="19" fill="none" stroke="#24120a" stroke-width="2"/>
      <circle cx="214" cy="273" r="8.5" fill="#140a05"/>
      <circle cx="302" cy="273" r="8.5" fill="#140a05"/>
      <circle cx="207" cy="263" r="6.5" fill="#ffffff"/>
      <circle cx="295" cy="263" r="6.5" fill="#ffffff"/>
      <circle cx="221" cy="283" r="2.8" fill="#ffffff" opacity="0.85"/>
      <circle cx="309" cy="283" r="2.8" fill="#ffffff" opacity="0.85"/>
      <path d="M 186 252 Q 212 240 238 252" stroke="#1c0f08" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M 278 252 Q 304 240 330 252" stroke="#1c0f08" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M 254 296 Q 260 302 254 306" stroke="#7c4527" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M 240 320 Q 258 330 278 318" stroke="#4a2413" stroke-width="5" fill="none" stroke-linecap="round"/>
      <ellipse cx="180" cy="300" rx="13" ry="7" fill="#c07a4a" opacity="0.35"/>
      <ellipse cx="336" cy="300" rx="13" ry="7" fill="#c07a4a" opacity="0.35"/>
    </g>

    <!-- main + petit monde (coin bas-gauche) -->
    <circle cx="54" cy="174" r="42" fill="url(#globeGlowT)"/>
    <ellipse cx="62" cy="200" rx="12" ry="9" fill="#a7693d"/>
    <circle cx="54" cy="174" r="23" fill="url(#globeGradT)"/>
    <path d="M 41 166 Q 48 161 56 164 Q 61 168 59 173 Q 53 176 46 174 Q 41 171 41 166 Z" fill="#eab308" opacity="0.9"/>
    <path d="M 58 184 Q 65 181 70 185 Q 68 191 61 192 Q 57 189 58 184 Z" fill="#eab308" opacity="0.9"/>
    <circle cx="54" cy="174" r="23" fill="none" stroke="#bfe7ff" stroke-width="2" opacity="0.65"/>
    <ellipse cx="48" cy="166" rx="8" ry="5" fill="#ffffff" opacity="0.35"/>
    <ellipse cx="72" cy="187" rx="4.5" ry="6.5" fill="#a7693d" transform="rotate(-35 72 187)"/>
    <ellipse cx="65" cy="193" rx="4.5" ry="6.5" fill="#a7693d" transform="rotate(-15 65 193)"/>
    <ellipse cx="56" cy="196" rx="4.5" ry="6.5" fill="#a7693d" transform="rotate(5 56 196)"/>
    <ellipse cx="47" cy="195" rx="4" ry="6" fill="#a7693d" transform="rotate(22 47 195)"/>
    <ellipse cx="75" cy="174" rx="4" ry="8" fill="#a7693d" transform="rotate(18 75 174)"/>
  </g>

  <!-- orbite (moitié avant, devant le menton) + satellite d'or -->
  <g transform="rotate(-16 128 152)">
    <path d="M 20 152 A 108 40 0 0 0 236 152" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.9"/>
    <circle cx="207" cy="184" r="7" fill="#eab308"/>
  </g>
</svg>
