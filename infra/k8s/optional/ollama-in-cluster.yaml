# FUTUR / PLACEHOLDER — Ollama DANS le cluster (inférence GPU-in-cluster).
# =========================================================================
# DÉSACTIVÉ : replicas = 0. À activer le jour où le passthrough GPU vers un
# nœud kind/K8s sous Windows est résolu (nvidia device-plugin / GPU operator).
#
# Bascule prévue quand ce sera prêt :
#   1. retirer le Service ExternalName « ollama » de la base (infra/k8s/ollama.yaml
#      -> le sortir de kustomization.yaml) ;
#   2. ajouter ce fichier aux resources actives (il fournit un Service « ollama »
#      ClusterIP de MÊME nom -> OLLAMA_HOST reste inchangé) ;
#   3. passer replicas à 1 et décommenter la réservation GPU ci-dessous.
#
# ⚠️ RTX 2060 Super = 8 Go VRAM : UN modèle 7-8B quantifié Q4 à la fois,
# pas une flotte. Pas de scaling horizontal de l'inférence sur ce poste.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: theatre
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: inference
spec:
  replicas: 0 # <-- DÉSACTIVÉ (placeholder). Passer à 1 quand GPU-in-cluster OK.
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/component: inference
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: http
              containerPort: 11434
          # Persiste les modèles téléchargés (ex. `ollama pull mistral`).
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
              # FUTUR : réservation GPU (exige nvidia device-plugin dans le cluster).
              # nvidia.com/gpu: 1
      volumes:
        - name: models
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: theatre
  labels:
    app.kubernetes.io/name: ollama
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - name: http
      port: 11434
      targetPort: http
