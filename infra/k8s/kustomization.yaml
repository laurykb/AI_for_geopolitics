# Base kustomize du « Théâtre des super-intelligences ».
# Applique la topologie ACTIVE de l'esquisse :
#   kubectl apply -k infra/k8s
#
# Validation client-side (ni cluster ni Docker requis) :
#   kubectl kustomize infra/k8s | kubectl apply --dry-run=client -f -
#
# NON inclus volontairement :
#   - secret.example.yaml   : template (valeurs CHANGE_ME), à copier en secret.yaml
#   - optional/*            : Postgres, Redis, Ollama-in-cluster = pistes FUTURes
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: theatre

resources:
  - namespace.yaml
  - configmap.yaml
  - api-deployment.yaml
  - api-service.yaml
  - web-deployment.yaml
  - web-service.yaml
  - ollama.yaml
  - ingress.yaml

# Étiquettes communes à toutes les ressources (traçabilité).
labels:
  - pairs:
      app.kubernetes.io/part-of: theatre-des-super-intelligences
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
