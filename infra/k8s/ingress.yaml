# Point d'entrée HTTP unique du jeu.
#   http://localhost/      -> front Next.js (theatre-web:3000)
#   http://localhost/api/* -> API FastAPI (theatre-api:8000), préfixe /api retiré
#
# Prérequis : le contrôleur ingress-nginx doit être installé dans le cluster.
# Pour kind (variante avec le label ingress-ready posé par kind-cluster.yaml) :
#   kubectl apply -f https://kismatic... voir infra/README.md pour la commande exacte
#   (manifeste officiel « deploy/static/provider/kind »).
#
# Le rewrite retire le préfixe /api : le backend expose /health, /game, /market…
# SANS préfixe. Les NEXT_PUBLIC_API_BASE=http://localhost/api du front tombent
# donc juste sur ces routes. (Seule l'ancienne route de démo /api/run devient
# /api/api/run — négligeable, non utilisée par le front.)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: theatre-ingress
  namespace: theatre
  annotations:
    # Retire le segment capturé (le préfixe /api) avant de transmettre à l'API.
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # SSE : pas de buffering, timeouts longs (un round de négociation dure ~1 min).
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # /api et /api/... -> API (le $2 capture le reste et alimente le rewrite).
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: theatre-api
                port:
                  number: 8000
          # Tout le reste -> front.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: theatre-web
                port:
                  number: 3000
