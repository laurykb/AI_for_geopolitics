# TEMPLATE de Secret — NE CONTIENT AUCUN VRAI SECRET (valeurs factices CHANGE_ME).
#
# Ce fichier n'est PAS dans la kustomization de base (le jeu tourne en SQLite,
# aucun secret requis). Pour brancher Supabase :
#   1. cp secret.example.yaml secret.yaml   (secret.yaml est git-ignoré, cf. .gitignore)
#   2. remplacer les CHANGE_ME par les vraies clés
#   3. kubectl apply -f infra/k8s/secret.yaml
#      (ou ajouter secret.yaml aux resources de kustomization.yaml)
#
# Le Deployment API référence ce Secret en `optional: true` : sans lui, le pod
# démarre quand même (mode SQLite). JAMAIS de vraie clé committée.
apiVersion: v1
kind: Secret
metadata:
  name: theatre-secrets
  namespace: theatre
type: Opaque
stringData:
  # --- Backend (requis seulement si STORE_BACKEND=supabase) ---
  SUPABASE_URL: "CHANGE_ME"
  SUPABASE_SERVICE_KEY: "CHANGE_ME"
  # --- Front (requis seulement pour l'auth/replay Supabase) ---
  # Rappel : ces NEXT_PUBLIC_* sont aussi des --build-arg côté web (inlinés au build).
  NEXT_PUBLIC_SUPABASE_URL: "CHANGE_ME"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "CHANGE_ME"
